name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Symlink SDK
        working-directory: ./buildscripts
        run: |
          mkdir sdk
          ln -s ${ANDROID_HOME} ./sdk/android-sdk-linux
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip python3-jinja2 gperf nasm
          sudo pip3 install --break-system-packages meson
      - name: Download dependencies
        working-directory: ./buildscripts
        env:
          IN_CI: 1
        run: ./download.sh

      - name: Apply patches
        working-directory: ./buildscripts
        run: ./patch.sh

      - name: Build
        working-directory: ./buildscripts
        run: ./build.sh
      - name: Build AAR
        run: ./gradlew -Pversion=${GITHUB_REF##*/} publishToMavenLocal
      - name: Archive artifacts
        run: tar -C ~/.m2/repository/com/github/Stremio -cvzf libmpv.tar.gz .
      - name: Archive build
        run: tar -C ./libmpv/build -cvzf build.tar.gz publications
      - name: Upload build artifacts
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "*.tar.gz"
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
